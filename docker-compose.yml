version: '3.8'

services:
  web:
    build: .
    ports:
      - "9000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/paulo_labels
      - BAG_API_KEY=${BAG_API_KEY}
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./attached_assets:/app/attached_assets
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=paulo_labels
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
